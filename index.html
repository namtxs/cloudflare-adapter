<html>
  <head>
    <title>Example App</title>
    <meta charset="UTF-8" />
    <style>
      .title {
        margin: 0px;
        padding: 5px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="result"></div>
    <script>
      const endpoint = "https://ngewibu.tv/api/rekomendasi";
      const result = document.querySelector(".result");
      result.innerHTML = "Loading...";
      fetch("http://localhost:8989/proxy?url=" + encodeURIComponent(endpoint))
        .then((response) => response.json())
        .then((data) => {
          let html = "";
          data.forEach((item, i) => {
            html += `<h3 class="title">${i + 1}. ${item.title}</h6>`;
          });
          result.innerHTML = html;
        })
        .catch((error) => console.error(error));
    </script>
  </body>
</html>
